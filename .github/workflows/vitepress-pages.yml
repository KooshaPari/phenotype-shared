name: Reusable VitePress Pages Deploy

on:
  workflow_call:
    inputs:
      concurrency_group:
        description: 'Concurrency group name (must be unique per repo to avoid collisions)'
        required: true
        type: string
      docs_dir:
        description: 'Working directory containing the VitePress site'
        required: false
        type: string
        default: 'docs'
      build_script:
        description: 'Bun script to run for building the site'
        required: false
        type: string
        default: 'docs:build'
      dist_subpath:
        description: 'Path to build output, relative to docs_dir'
        required: false
        type: string
        default: '.vitepress/dist'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ inputs.concurrency_group }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.1.1

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b

      - name: Install dependencies
        working-directory: ${{ inputs.docs_dir }}
        run: bun install

      - name: Build VitePress site
        working-directory: ${{ inputs.docs_dir }}
        run: bun run ${{ inputs.build_script }}
        env:
          GITHUB_PAGES: "true"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b
        with:
          path: ${{ inputs.docs_dir }}/${{ inputs.dist_subpath }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
