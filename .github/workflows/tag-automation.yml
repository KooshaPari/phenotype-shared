name: reusable-tag-automation

# Reusable tag automation for Rust workspaces. Extracts version from
# Cargo.toml [workspace.package] (or [package]), validates semver,
# creates and pushes a v<VERSION> tag if missing. The release workflow
# handles GitHub Release creation and asset upload separately.
#
# Callers invoke with:
#   jobs:
#     tag:
#       uses: KooshaPari/phenoShared/.github/workflows/tag-automation.yml@main

permissions:
  contents: write

on:
  workflow_call:
    inputs:
      cargo-toml-path:
        description: Path to Cargo.toml (relative to repo root)
        required: false
        type: string
        default: Cargo.toml
      version-section:
        description: TOML section to extract version from (workspace.package or package)
        required: false
        type: string
        default: workspace.package

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.1.1
        with:
          fetch-depth: 0

      - name: Extract version from Cargo.toml
        id: version
        env:
          CARGO_TOML: ${{ inputs.cargo-toml-path }}
          SECTION: ${{ inputs.version-section }}
        run: |
          VERSION=$(grep -A 5 "\[${SECTION}\]" "${CARGO_TOML}" | grep '^version' | head -1 | sed 's/version = "\(.*\)"/\1/')
          if [ -z "$VERSION" ]; then
            echo "ERROR: Could not extract version from ${CARGO_TOML} [${SECTION}]" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Extracted version: ${VERSION}"

      - name: Validate version format
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Invalid version format: $VERSION" >&2
            exit 1
          fi
          echo "Version format validated: $VERSION"

      - name: Check if tag exists
        id: check_tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="v${VERSION}"
          if git rev-parse "$TAG" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG already exists, skipping creation"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Tag $TAG does not exist, will create"
          fi

      - name: Create and push tag
        if: steps.check_tag.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="v${VERSION}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "Created and pushed tag: $TAG"

      - name: Release workflow will run for new tag
        if: steps.check_tag.outputs.exists == 'false'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo "Pushed v${VERSION}. The Release workflow creates the GitHub Release and assets."
