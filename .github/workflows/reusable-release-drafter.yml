name: Reusable Release Drafter

on:
  workflow_call:
    inputs:
      action-version:
        description: "release-drafter action ref (tag, SHA, or v6/v7)"
        type: string
        required: false
        default: "v6"
      config-name:
        description: "Config file name under .github/"
        type: string
        required: false
        default: ""
      include-pull-request-trigger:
        description: "Also run on pull_request opened/reopened/synchronize"
        type: boolean
        required: false
        default: false

permissions:
  contents: read

jobs:
  update_release_draft:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Update release draft
        uses: release-drafter/release-drafter@6a93d829887aa2e0748befe2e808c66c0ec6e4c7
        with:
          config-name: ${{ inputs.config-name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
