name: Reusable Release (Rust / crates.io)

# Reusable workflow: build, test, and publish a Rust crate to crates.io,
# then promote via phenotypeActions/promote.

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      rust-version:
        description: 'Rust toolchain version'
        type: string
        required: false
        default: 'stable'
      path:
        description: 'Working directory (Cargo.toml location)'
        type: string
        required: false
        default: '.'
      channel:
        description: 'Promotion channel (alpha|beta|stable)'
        type: string
        required: false
        default: 'beta'
      registry:
        description: 'Registry name passed to promote action'
        type: string
        required: false
        default: 'crates.io'
      publish:
        description: 'Whether to publish to crates.io'
        type: boolean
        required: false
        default: true
    secrets:
      CARGO_REGISTRY_TOKEN:
        required: false
    outputs:
      version:
        description: 'Version detected from Cargo.toml'
        value: ${{ jobs.release.outputs.version }}

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    defaults:
      run:
        working-directory: ${{ inputs.path }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.1.1
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ inputs.rust-version }}

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test --release

      - name: Determine version
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Publish to crates.io
        if: ${{ inputs.publish }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --token "$CARGO_REGISTRY_TOKEN"

  promote:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.1.1

      - name: Promote
        uses: KooshaPari/phenotypeActions/promote@main
        with:
          version: ${{ needs.release.outputs.version }}
          channel: ${{ inputs.channel }}
          registry: ${{ inputs.registry }}
