name: Reusable SAST (CodeQL)

# Reusable workflow: CodeQL static analysis across configurable languages.

permissions:
  contents: read
  security-events: write
  actions: read

on:
  workflow_call:
    inputs:
      languages:
        description: 'JSON array of CodeQL languages (e.g. ["rust","python"])'
        type: string
        required: false
        default: '["javascript","typescript","python","go"]'
      path:
        description: 'Working directory'
        type: string
        required: false
        default: '.'
      build-mode:
        description: 'CodeQL build mode (autobuild|manual|none)'
        type: string
        required: false
        default: 'autobuild'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  codeql:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(inputs.languages) }}
    defaults:
      run:
        working-directory: ${{ inputs.path }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.1.1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ inputs.build-mode }}

      - name: Autobuild
        if: ${{ inputs.build-mode == 'autobuild' }}
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}
